services:
  db:
    image: postgres:16-alpine
    container_name: bistroflow-db
    environment:
      POSTGRES_DB: bistroflow
      POSTGRES_USER: bistroflow
      POSTGRES_PASSWORD: bistroflow_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bistroflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bistroflow-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: bistroflow-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: bistroflow
      DB_PASSWORD: bistroflow_dev
      DB_NAME: bistroflow
      SERVER_PORT: 8080
      GIN_MODE: debug
      FRONTEND_URL: http://localhost:3000
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    networks:
      - bistroflow-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: bistroflow-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - bistroflow-net

volumes:
  pgdata:
  uploads:

networks:
  bistroflow-net:
    driver: bridge
